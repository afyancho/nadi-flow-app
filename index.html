<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NadiFlow Dashboard - AI Supply Chain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .active-tab { @apply bg-blue-50 text-blue-700 font-bold; }
        .active-tab svg { @apply text-blue-600; }
        .hidden { display: none; }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="flex h-screen overflow-hidden">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-white border-r border-gray-200 hidden md:flex flex-col">
            <div class="p-6">
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight">
                    Nadi<span class="text-blue-600">Flow</span> 
                    <span class="text-xs font-normal text-gray-500 bg-gray-100 px-2 py-1 rounded-full uppercase">AI</span>
                </h1>
                <div class="mt-3 flex bg-gray-100 p-1 rounded-lg w-fit">
                    <button onclick="setLanguage('id')" id="btn-lang-id" class="px-3 py-1 text-xs font-bold rounded-md transition bg-white shadow-sm text-blue-600">ID</button>
                    <button onclick="setLanguage('en')" id="btn-lang-en" class="px-3 py-1 text-xs font-bold rounded-md transition text-gray-500">EN</button>
                </div>
                <p id="txt-logo-tag" class="text-[10px] text-gray-400 mt-2 font-medium uppercase tracking-wider">Manajemen Rantai Pasok AI</p>
            </div>
            
            <nav class="flex-1 px-4 space-y-1 mt-2 overflow-y-auto" id="main-nav">
                <!-- Nav items generated by JS -->
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 flex flex-col h-screen overflow-hidden">
            <header class="bg-white border-b border-gray-200 px-8 py-5 flex justify-between items-center z-10">
                <div>
                    <h2 id="page-title" class="text-xl font-semibold text-gray-800">Aktivitas Rantai Pasok</h2>
                    <p id="page-subtitle" class="text-sm text-gray-500">Ringkasan S&OP Ritel Fast Fashion</p>
                </div>
                <div class="flex items-center space-x-3">
                    <button onclick="exportData()" class="bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-lg text-sm font-medium flex items-center space-x-2 hover:bg-gray-50 transition shadow-sm">
                        <i data-lucide="download" class="w-4 h-4"></i> 
                        <span id="btn-txt-export">Ekspor Data</span>
                    </button>
                    <div id="header-action-container">
                        <!-- Conditional Buttons -->
                    </div>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-8" id="view-container">
                <!-- Views dynamicly injected here -->
            </div>
        </main>
    </div>

    <!-- MODALS -->
    <div id="modal-overlay" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div id="modal-content" class="bg-white rounded-2xl shadow-xl w-full max-w-2xl overflow-hidden">
            <!-- Modal inner content injected here -->
        </div>
    </div>

    <script>
        // --- DATA ---
        const inventoryData = [
            { channel: 'Central Online Warehouse', stock: 12500, capacity: 20000, color: 'bg-blue-600' },
            { channel: 'Central Offline Warehouse', stock: 4200, capacity: 8000, color: 'bg-indigo-500' },
            { channel: 'Offline Store', stock: 2800, capacity: 5000, color: 'bg-orange-500' },
            { channel: 'On Going Production', stock: 1500, capacity: 3000, color: 'bg-teal-500' },
        ];

        const restockPlanData = [
            { id: 'SKU-7721', brand: 'HEYLOCAL', name: 'Kemeja Linen Oversized', category: 'SHIRTS', variant: 'Beige / L', currentStock: 45, dailyVelocity: 12, leadTime: 14, recommendedQty: 300, status: 'Kritis', revenueRisk: 75000000 },
            { id: 'SKU-9910', brand: 'HEYMALE', name: 'Crop Top Rajut', category: 'KNITWEAR', variant: 'Putih / S', currentStock: 18, dailyVelocity: 8, leadTime: 10, recommendedQty: 150, status: 'Kritis', revenueRisk: 22500000 },
            { id: 'SKU-1129', brand: 'PREPP STUDIO', name: 'Kaos Katun Basic', category: 'TEES', variant: 'Olive / M', currentStock: 85, dailyVelocity: 10, leadTime: 7, recommendedQty: 200, status: 'Peringatan', revenueRisk: 15000000 },
            { id: 'SKU-4402', brand: 'HEYMALE', name: 'Jaket Kargo Denim', category: 'JACKETS', variant: 'Biru / XL', currentStock: 150, dailyVelocity: 5, leadTime: 20, recommendedQty: 100, status: 'Tinjau', revenueRisk: 0 },
            { id: 'SKU-8832', brand: 'HEYLOCAL', name: 'Celana Kulot Lipit', category: 'PANTS', variant: 'Hitam / M', currentStock: 320, dailyVelocity: 15, leadTime: 14, recommendedQty: 250, status: 'Sehat', revenueRisk: 0 },
        ];

        const productDevData = [
            { id: 'DSN-001', brand: 'HEYMALE', name: 'Koleksi Y2K Cargo', category: 'PANTS', trendScore: 94, recommendedQty: 1000, targetLaunch: 'Okt 2026', status: 'Disetujui' },
            { id: 'DSN-002', brand: 'PREPP STUDIO', name: 'Earth-Tone Shacket', category: 'JACKETS', trendScore: 88, recommendedQty: 800, targetLaunch: 'Nov 2026', status: 'Desain' },
            { id: 'DSN-003', brand: 'HEYLOCAL', name: 'Signature Monogram', category: 'SCARFS', trendScore: 92, recommendedQty: 1500, targetLaunch: 'Nov 2026', status: 'Sampling' },
        ];

        const suppliersData = [
            { id: 'V-001', name: 'ARA KONVEKSI', categories: ['SHIRTS', 'POLO SHIRTS', 'TEES'], load: 95, defectRate: '1.2%', avgLeadTime: 25, rating: 4.8, status: 'Kapasitas Penuh' },
            { id: 'V-002', name: 'PT MULTI INDO GARMENT', categories: ['JACKETS', 'PANTS', 'SHIRTS'], load: 82, defectRate: '4.5%', avgLeadTime: 30, rating: 3.5, status: 'Peringatan QC' },
            { id: 'V-003', name: 'CV PENTA', categories: ['TEES', 'KNITWEAR', 'PANTS'], load: 45, defectRate: '0.8%', avgLeadTime: 15, rating: 4.9, status: 'Sangat Direkomendasikan' },
            { id: 'V-004', name: 'MASCOMODOS', categories: ['SCARFS', 'PRAYER SETS'], load: 30, defectRate: '1.5%', avgLeadTime: 14, rating: 4.5, status: 'Tersedia' },
            { id: 'V-005', name: 'PT GINZA CIPTA INDAH', categories: ['BAGS', 'SHOES'], load: 60, defectRate: '2.1%', avgLeadTime: 40, rating: 4.2, status: 'Tersedia' },
            { id: 'V-006', name: 'CV CENTRAL FRAGRANCE', categories: ['PARFUME'], load: 50, defectRate: '0.2%', avgLeadTime: 20, rating: 5.0, status: 'Tersedia' },
        ];

        const poData = [
            { id: 'PO-2026-081', supplier: 'ARA KONVEKSI', items: 3, totalQty: 1200, estValue: 180000000, orderDate: '10 Apr 2026', status: 'Diproduksi' },
            { id: 'PO-2026-082', supplier: 'PT GINZA CIPTA INDAH', items: 1, totalQty: 500, estValue: 75000000, orderDate: '12 Apr 2026', status: 'Dikirim' },
            { id: 'PO-2026-083', supplier: 'CV PENTA', items: 2, totalQty: 850, estValue: 68000000, orderDate: '14 Apr 2026', status: 'Draft' },
            { id: 'PO-2026-088', supplier: 'CV PENTA', items: 3, totalQty: 1000, estValue: 85000000, orderDate: '01 Apr 2026', status: 'Selesai' },
        ];

        const wipData = [
            { po: 'PO-2026-081', item: 'Kemeja Linen Oversized', vendor: 'ARA KONVEKSI', qty: 1200, stage: 'Penjahitan (Sewing)', progress: 65, estFinish: '20 Apr 2026' },
            { po: 'PO-2026-085', item: 'Celana Kulot Lipit', vendor: 'CV PENTA', qty: 600, stage: 'Pemotongan (Cutting)', progress: 20, estFinish: '25 Apr 2026' },
        ];

        const transferData = [
            { id: 'TRF-1029', from: 'Central Online Warehouse', to: 'Heylocal Makassar', item: 'Kemeja Linen (SKU-7721)', qty: 50, status: 'Dalam Perjalanan', reason: {id: 'Mencegah Stockout Lokal', en: 'Prevent Local Stockout'} },
            { id: 'TRF-1030', from: 'Central Online Warehouse', to: 'Heylocal Pakuwon Mall Bekasi', item: 'Crop Top Rajut (SKU-9910)', qty: 30, status: 'Selesai', reason: {id: 'Tren Penjualan Naik 40%', en: 'Sales Trend Up 40%'} },
        ];

        const costingData = [
            { sku: 'SKU-7721', name: 'Kemeja Linen Oversized', sellingPrice: 249000, cogs: 85000, logistics: 15000, margin: 59.8, vendor: 'ARA KONVEKSI', optimization: {id: 'Pindah ke PT MULTI INDO GARMENT (+5% Margin)', en: 'Move to PT MULTI INDO GARMENT (+5% Margin)'} },
            { sku: 'SKU-9910', name: 'Crop Top Rajut', sellingPrice: 150000, cogs: 45000, logistics: 8000, margin: 64.6, vendor: 'CV PENTA', optimization: {id: 'Sudah Optimal', en: 'Optimized'} },
            { sku: 'SKU-8832', name: 'Celana Kulot Lipit', sellingPrice: 289000, cogs: 110000, logistics: 18000, margin: 55.7, vendor: 'PT MULTI INDO', optimization: {id: 'Bahan Baku Naik', en: 'Raw Material Cost Up'} },
            { sku: 'SKU-4402', name: 'Jaket Kargo Denim', sellingPrice: 350000, cogs: 160000, logistics: 25000, margin: 47.1, vendor: 'PT MULTI INDO', optimization: {id: 'Konsolidasi Pengiriman', en: 'Consolidate Shipping'} },
        ];

        // --- TRANSLATIONS ---
        const dict = {
            id: {
                logoTag: 'Manajemen Rantai Pasok AI',
                menu: {
                    dashboard: 'Dasbor Utama', productDev: 'Rencana Produk', restock: 'Mesin Restock',
                    fulfillment: 'Fulfillment & Toko', poManagement: 'Manajemen PO', production: 'Status Produksi', 
                    supplier: 'Manajemen Supplier', costing: 'Biaya & Margin'
                },
                titles: {
                    dashboard: 'Aktivitas Rantai Pasok', subDashboard: 'Ringkasan S&OP Ritel Fast Fashion',
                    productDev: 'Rencana Pengembangan Produk', subProductDev: 'Perencanaan Desain Berbasis AI & Analisis Tren',
                    restock: 'Mesin Restock', subRestock: 'Prioritisasi Restock Berdasarkan Risiko Pendapatan',
                    fulfillment: 'Fulfillment & Toko', subFulfillment: 'Manajemen Kapasitas & Distribusi Omnichannel',
                    poManagement: 'Manajemen PO', subPoManagement: 'Pelacakan Siklus Hidup Purchase Order Menyeluruh',
                    production: 'Laporan Status Produksi', subProduction: 'Pelacakan Produksi & Analisis Kapasitas/QC Vendor',
                    supplier: 'Manajemen Supplier', subSupplier: 'Direktori Vendor, Spesialisasi Kategori & Metrik Performa',
                    costing: 'Analisis Biaya & Margin', subCosting: 'Pemantauan HPP, Logistik, dan Profitabilitas per SKU'
                },
                buttons: {
                    export: 'Ekspor Data', generatePO: 'Generate PO', autoGeneratePO: 'Auto-Generate PO (Kritis)',
                    newPO: 'PO Baru', manualDesign: 'Buat Desain Manual', cancel: 'Batal', save: 'Simpan', addVendor: 'Tambah Vendor'
                },
                kpi: { tracked: 'Total SKU Dipantau', risk: 'Potensi Rugi (Stockout)', sellThrough: 'Sell-Through Total', wip: 'PO Berjalan (WIP)' },
                common: { search: 'Cari SKU atau produk...', status: 'Status', vendor: 'Vendor', qty: 'Kuantitas', all: 'Semua', draft: 'Draft', production: 'Diproduksi', shipped: 'Dikirim', done: 'Selesai' }
            },
            en: {
                logoTag: 'AI Supply Chain Mgmt',
                menu: {
                    dashboard: 'Overview Dashboard', productDev: 'Product Dev Plan', restock: 'Restock Engine',
                    fulfillment: 'Fulfillment & Stores', poManagement: 'PO Management', production: 'Production Status', 
                    supplier: 'Supplier Management', costing: 'Costing & Margin'
                },
                titles: {
                    dashboard: 'Supply Chain Activities', subDashboard: 'Fast Fashion Retail S&OP Overview',
                    productDev: 'Product Development Plan', subProductDev: 'AI-Driven Design Planning & Trend Analysis',
                    restock: 'Restock Engine', subRestock: 'Restock Prioritization Based on Revenue Risk',
                    fulfillment: 'Fulfillment & Stores', subFulfillment: 'Capacity Management & Omnichannel Distribution',
                    poManagement: 'PO Management', subPoManagement: 'End-to-End Purchase Order Lifecycle Tracking',
                    production: 'Production Status Report', subProduction: 'Production Tracking & Vendor Capacity/QC Analysis',
                    supplier: 'Supplier Management', subSupplier: 'Vendor Directory, Category Specialization & Performance Metrics',
                    costing: 'Costing & Margin Analysis', subCosting: 'COGS, Logistics, and Profitability Tracking per SKU'
                },
                buttons: {
                    export: 'Export Data', generatePO: 'Generate PO', autoGeneratePO: 'Auto-Generate PO (Critical)',
                    newPO: 'New PO', manualDesign: 'Create Manual Design', cancel: 'Cancel', save: 'Save', addVendor: 'Add Vendor'
                },
                kpi: { tracked: 'Total SKUs Tracked', risk: 'Revenue Risk (Stockout)', sellThrough: 'Overall Sell-Through', wip: 'Active POs (WIP)' },
                common: { search: 'Search SKU...', status: 'Status', vendor: 'Vendor', qty: 'Qty', all: 'All', draft: 'Draft', production: 'Production', shipped: 'Shipped', done: 'Done' }
            }
        };

        // --- STATE ---
        let currentLang = 'id';
        let currentTab = 'dashboard';

        // --- UTILS ---
        function formatCurrency(num) {
            if (currentLang === 'id') {
                return 'Rp ' + (num / 1000000).toFixed(1) + ' Jt';
            }
            return '$' + (num / 15000).toLocaleString();
        }

        // --- UI HANDLERS ---
        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('btn-lang-id').className = lang === 'id' ? 'px-3 py-1 text-xs font-bold rounded-md transition bg-white shadow-sm text-blue-600' : 'px-3 py-1 text-xs font-bold rounded-md transition text-gray-500';
            document.getElementById('btn-lang-en').className = lang === 'en' ? 'px-3 py-1 text-xs font-bold rounded-md transition bg-white shadow-sm text-blue-600' : 'px-3 py-1 text-xs font-bold rounded-md transition text-gray-500';
            render();
        }

        function setActiveTab(tab) {
            currentTab = tab;
            render();
        }

        function toggleModal(show, contentHtml = '') {
            const overlay = document.getElementById('modal-overlay');
            if (show) {
                document.getElementById('modal-content').innerHTML = contentHtml;
                overlay.classList.remove('hidden');
            } else {
                overlay.classList.add('hidden');
            }
            lucide.createIcons();
        }

        // --- NAVIGATION ---
        const navItems = [
            { id: 'dashboard', icon: 'layout-dashboard' },
            { id: 'product-dev', icon: 'trending-up' },
            { id: 'restock', icon: 'package-search' },
            { id: 'fulfillment', icon: 'store' },
            { id: 'po', icon: 'file-text' },
            { id: 'supplier', icon: 'users' },
            { id: 'production', icon: 'clipboard-list' },
            { id: 'costing', icon: 'badge-dollar-sign' }
        ];

        function renderNav() {
            const container = document.getElementById('main-nav');
            const t = dict[currentLang].menu;
            container.innerHTML = navItems.map(item => `
                <button onclick="setActiveTab('${item.id}')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 ${currentTab === item.id ? 'active-tab' : 'text-gray-500 hover:bg-gray-100 font-medium'}">
                    <i data-lucide="${item.icon}" class="w-5 h-5"></i>
                    <span>${t[item.id === 'po' ? 'poManagement' : (item.id === 'product-dev' ? 'productDev' : item.id)]}</span>
                </button>
            `).join('');
            lucide.createIcons();
        }

        // --- VIEWS ---
        function renderDashboard() {
            const t = dict[currentLang];
            return `
                <div class="space-y-8 animate-in fade-in duration-500">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm">
                            <div class="flex justify-between items-start">
                                <div><p class="text-sm font-medium text-gray-500">${t.kpi.tracked}</p><h3 class="text-2xl font-bold text-gray-900 mt-1">1,248</h3></div>
                                <div class="p-3 rounded-xl bg-blue-100"><i data-lucide="package-search" class="text-blue-600"></i></div>
                            </div>
                        </div>
                        <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm">
                            <div class="flex justify-between items-start">
                                <div><p class="text-sm font-medium text-gray-500">${t.kpi.risk}</p><h3 class="text-2xl font-bold text-red-600 mt-1">${formatCurrency(97500000)}</h3></div>
                                <div class="p-3 rounded-xl bg-red-100"><i data-lucide="dollar-sign" class="text-red-600"></i></div>
                            </div>
                        </div>
                        <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm">
                            <div class="flex justify-between items-start">
                                <div><p class="text-sm font-medium text-gray-500">${t.kpi.sellThrough}</p><h3 class="text-2xl font-bold text-green-600 mt-1">68.5%</h3></div>
                                <div class="p-3 rounded-xl bg-green-100"><i data-lucide="trending-up" class="text-green-600"></i></div>
                            </div>
                        </div>
                        <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm">
                            <div class="flex justify-between items-start">
                                <div><p class="text-sm font-medium text-gray-500">${t.kpi.wip}</p><h3 class="text-2xl font-bold text-orange-600 mt-1">8</h3></div>
                                <div class="p-3 rounded-xl bg-orange-100"><i data-lucide="factory" class="text-orange-600"></i></div>
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-1 bg-white border border-gray-100 rounded-2xl shadow-sm p-6">
                            <h3 class="text-lg font-bold text-gray-900 mb-6">${currentLang === 'id' ? 'Posisi Inventori' : 'Inventory Position'}</h3>
                            <div class="space-y-6">
                                ${inventoryData.map(item => `
                                    <div>
                                        <div class="flex justify-between text-sm mb-2"><span class="font-medium">${item.channel}</span><span>${item.stock.toLocaleString()} units</span></div>
                                        <div class="w-full bg-gray-100 rounded-full h-3"><div class="h-3 rounded-full ${item.color}" style="width: ${Math.round(item.stock/item.capacity*100)}%"></div></div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        <div class="lg:col-span-2 bg-white border border-gray-100 rounded-2xl shadow-sm overflow-hidden">
                            <div class="p-6 border-b border-gray-100"><h3 class="text-lg font-bold text-gray-900">Top Restock Priority</h3></div>
                            <table class="w-full text-left">
                                <tr class="bg-gray-50 text-gray-500 text-xs uppercase"><th class="p-4">SKU</th><th class="p-4 text-center">Days Left</th><th class="p-4 text-center">Qty</th><th class="p-4 text-right">Risk</th></tr>
                                ${restockPlanData.slice(0, 3).map(row => `
                                    <tr class="text-sm border-t border-gray-100">
                                        <td class="p-4"><p class="font-medium">${row.name}</p><p class="text-xs text-gray-500">${row.id}</p></td>
                                        <td class="p-4 text-center"><span class="px-2 py-1 rounded bg-red-100 text-red-700 font-bold">${Math.floor(row.currentStock/row.dailyVelocity)}d</span></td>
                                        <td class="p-4 text-center text-blue-600 font-bold">+${row.recommendedQty}</td>
                                        <td class="p-4 text-right text-red-600 font-bold">${formatCurrency(row.revenueRisk)}</td>
                                    </tr>
                                `).join('')}
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderRestock() {
            const t = dict[currentLang];
            return `
                <div class="space-y-6">
                    <div class="bg-indigo-50 border border-indigo-100 rounded-xl p-4 flex items-start space-x-3">
                        <i data-lucide="zap" class="text-indigo-600"></i>
                        <div>
                            <h4 class="text-sm font-bold text-indigo-900">${t.titles.restock} AI Insights</h4>
                            <p class="text-xs text-indigo-700 mt-1">${t.common.all} SKU kritis butuh segera di-PO untuk amankan pendapatan.</p>
                        </div>
                    </div>
                    <div class="bg-white border border-gray-100 rounded-2xl shadow-sm overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50 text-gray-500 text-xs uppercase font-medium">
                                <tr><th class="p-4">SKU</th><th class="p-4 text-center">Stock</th><th class="p-4 text-center">Velocity</th><th class="p-4 text-center">Restock Qty</th><th class="p-4 text-right">Status</th></tr>
                            </thead>
                            <tbody class="text-sm">
                                ${restockPlanData.map(row => `
                                    <tr class="border-t border-gray-100 hover:bg-gray-50">
                                        <td class="p-4"><p class="font-medium">${row.name}</p><p class="text-xs text-gray-500">${row.id}</p></td>
                                        <td class="p-4 text-center font-bold">${row.currentStock}</td>
                                        <td class="p-4 text-center">${row.dailyVelocity}/day</td>
                                        <td class="p-4 text-center text-blue-600 font-bold">+${row.recommendedQty}</td>
                                        <td class="p-4 text-right"><span class="px-2.5 py-1 rounded-full text-xs font-bold ${row.status === 'Kritis' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}">${row.status}</span></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderSupplier() {
            return `
                <div class="space-y-6">
                    <div class="bg-white border border-gray-100 rounded-2xl shadow-sm overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50 text-gray-500 text-xs uppercase font-medium">
                                <tr><th class="p-4">Vendor Name</th><th class="p-4">Categories</th><th class="p-4 text-center">Load</th><th class="p-4 text-right">Rating</th></tr>
                            </thead>
                            <tbody class="text-sm">
                                ${suppliersData.map(row => `
                                    <tr class="border-t border-gray-100 hover:bg-gray-50">
                                        <td class="p-4 font-bold">${row.name}</td>
                                        <td class="p-4"><div class="flex gap-1">${row.categories.map(c => `<span class="bg-gray-100 text-[10px] px-2 py-0.5 rounded border">${c}</span>`).join('')}</div></td>
                                        <td class="p-4 text-center">
                                            <div class="w-full bg-gray-200 h-1.5 rounded-full"><div class="h-1.5 rounded-full bg-blue-600" style="width: ${row.load}%"></div></div>
                                            <span class="text-[10px] text-gray-500">${row.load}%</span>
                                        </td>
                                        <td class="p-4 text-right font-bold text-yellow-600">⭐ ${row.rating}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        // --- CORE RENDER ---
        function render() {
            const t = dict[currentLang];
            
            // Header
            document.getElementById('txt-logo-tag').innerText = t.logoTag;
            document.getElementById('page-title').innerText = t.titles[currentTab === 'po' ? 'poManagement' : (currentTab === 'product-dev' ? 'productDev' : currentTab)];
            document.getElementById('page-subtitle').innerText = t.titles['sub' + (currentTab === 'po' ? 'PoManagement' : (currentTab.charAt(0).toUpperCase() + currentTab.slice(1)))];
            document.getElementById('btn-txt-export').innerText = t.buttons.export;

            // Nav
            renderNav();

            // Actions
            const actionContainer = document.getElementById('header-action-container');
            if (['dashboard', 'restock'].includes(currentTab)) {
                actionContainer.innerHTML = `<button onclick="openPOModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center space-x-2 hover:bg-blue-700 shadow-sm transition"><span>${t.buttons.generatePO}</span><i data-lucide="arrow-right" class="w-4 h-4"></i></button>`;
            } else if (currentTab === 'supplier') {
                actionContainer.innerHTML = `<button onclick="openVendorModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center space-x-2 hover:bg-blue-700 shadow-sm transition"><i data-lucide="plus" class="w-4 h-4"></i><span>${t.buttons.addVendor}</span></button>`;
            } else {
                actionContainer.innerHTML = '';
            }

            // View Content
            const container = document.getElementById('view-container');
            switch(currentTab) {
                case 'dashboard': container.innerHTML = renderDashboard(); break;
                case 'restock': container.innerHTML = renderRestock(); break;
                case 'supplier': container.innerHTML = renderSupplier(); break;
                default: container.innerHTML = `<div class="p-20 text-center text-gray-400">View for "${currentTab}" is under development in this HTML version.</div>`;
            }
            
            lucide.createIcons();
        }

        // --- MODAL VIEWS ---
        function openPOModal() {
            const t = dict[currentLang];
            const html = `
                <div class="flex justify-between items-center p-6 border-b">
                    <h3 class="text-lg font-bold">Auto-Generate Purchase Order</h3>
                    <button onclick="toggleModal(false)"><i data-lucide="x" class="w-5 h-5 text-gray-400"></i></button>
                </div>
                <div class="p-6 space-y-4">
                    <div class="bg-blue-50 p-4 rounded-xl text-blue-800 text-sm">
                        AI mendeteksi 2 SKU kritis kategori <b>SHIRTS</b>.
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Pilih Vendor Spesialis</label>
                        <select class="w-full border rounded-xl px-4 py-2 text-sm outline-none">
                            <option>CV PENTA (Load: 45%) - Recommended</option>
                            <option>ARA KONVEKSI (Load: 95%) - High Risk</option>
                        </select>
                    </div>
                </div>
                <div class="p-6 bg-gray-50 border-t flex justify-end space-x-3">
                    <button onclick="toggleModal(false)" class="text-gray-500 text-sm font-medium">Batal</button>
                    <button onclick="toggleModal(false)" class="bg-blue-600 text-white px-6 py-2 rounded-lg text-sm font-bold shadow-md">Kirim PO</button>
                </div>
            `;
            toggleModal(true, html);
        }

        function openVendorModal() {
            const t = dict[currentLang];
            const html = `
                <div class="flex justify-between items-center p-6 border-b">
                    <h3 class="text-lg font-bold">Tambah / Edit Vendor</h3>
                    <button onclick="toggleModal(false)"><i data-lucide="x" class="w-5 h-5 text-gray-400"></i></button>
                </div>
                <div class="p-6 space-y-4">
                    <input type="text" placeholder="Nama Vendor" class="w-full border rounded-xl px-4 py-3 text-sm outline-none">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" placeholder="Lead Time (days)" class="border rounded-xl px-4 py-3 text-sm outline-none">
                        <input type="text" placeholder="Rating" class="border rounded-xl px-4 py-3 text-sm outline-none">
                    </div>
                </div>
                <div class="p-6 bg-gray-50 border-t flex justify-end space-x-3">
                    <button onclick="toggleModal(false)" class="bg-blue-600 text-white px-6 py-2 rounded-lg text-sm font-bold">Simpan Vendor</button>
                </div>
            `;
            toggleModal(true, html);
        }

        function exportData() {
            // Mock CSV Export
            const content = "SKU,Stock,Status\nSKU-7721,45,Kritis\nSKU-9910,18,Kritis";
            const blob = new Blob([content], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', `nadiflow_${currentTab}_export.csv`);
            a.click();
        }

        // --- INIT ---
        window.onload = () => {
            render();
        };
    </script>
</body>
</html>
